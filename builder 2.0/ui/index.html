<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MUD Builder</title>

    <style>
        /* ================= BASE ================= */
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #020617;
            color: #e2e8f0;
        }

        /* ================= NAV ================= */
        .navbar {
            padding: 10px 20px;
            border-bottom: 1px solid #1e293b;
            display: flex;
            gap: 20px;
        }

            .navbar a {
                cursor: pointer;
                color: #94a3b8;
            }

                .navbar a:hover {
                    color: #38bdf8;
                }

        /* ================= LAYOUT ================= */
        .app {
            display: flex;
            height: calc(100vh - 50px);
        }

        .page {
            display: none;
            width: 100%;
        }

        .sidebar {
            width: 260px;
            border-right: 1px solid #1e293b;
            padding: 12px;
            overflow: auto;
        }

        .editor {
            flex: 1;
            padding: 12px;
            overflow: auto;
        }

        .panel {
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
        }

        /* ================= LIST ================= */
        .item {
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
        }

            .item:hover {
                background: #0f172a;
            }

            .item.active {
                background: #1e293b;
            }

        /* ================= INPUT ================= */
        input, textarea, select {
            width: 100%;
            margin-bottom: 6px;
            padding: 6px;
            border-radius: 6px;
            border: 1px solid #1e293b;
            background: #020617;
            color: white;
        }

        button {
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #1e293b;
            background: #0f172a;
            color: white;
            cursor: pointer;
        }

            button:hover {
                background: #1e293b;
            }

        /* ================= MAP ================= */
        #mapWrapper {
            height: 500px;
            overflow: auto;
            border: 1px solid #1e293b;
            border-radius: 8px;
        }

        #mapInner {
            width: 3000px;
            height: 3000px;
        }

        /* ================= EXITS ================= */
        .exit-card {
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 6px;
        }

        .exit-title {
            color: #38bdf8;
            font-weight: bold;
        }

        .exit-row {
            display: flex;
            gap: 5px;
        }

        .exit-flags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <a onclick="showPage('rooms')">Rooms</a>
        <a onclick="showPage('items')">Items</a>
        <a onclick="showPage('mobs')">Mobs</a>
    </div>

    <div class="app">

        <!-- ROOMS -->
        <div id="rooms" class="page" style="display:flex;">
            <div class="sidebar">
                <h3>Rooms</h3>
                <button onclick="newRoom()">+ New</button>
                <button onclick="saveRooms()">💾 Save</button>
                <button onclick="deleteRoom()">❌ Delete</button>
                <div id="roomList"></div>
            </div>

            <div class="editor">

                <div class="panel">
                    <input id="room_vnum" placeholder="VNUM">
                    <input id="room_name" placeholder="Name">
                    <input id="room_zone" placeholder="Zone">
                </div>

                <div class="panel">
                    <input id="room_short" placeholder="Short desc">
<textarea id="room_long" placeholder="Long desc"></textarea>
                </div>

                <div class="panel">
                    <h4>Exits</h4>
                    <div id="exitsContainer"></div>
                </div>

                <div class="panel">
                    <h4>Map</h4>
                    <div id="mapWrapper">
                        <div id="mapInner">
                            <canvas id="mapCanvas" width="3000" height="3000"></canvas>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- ITEMS -->
        <div id="items" class="page">
            <div class="sidebar">
                <h3>Items</h3>
                <button onclick="newItem()">+ New</button>
                <button onclick="saveItem()">💾 Save</button>
                <button onclick="deleteItem()">❌ Delete</button>
                <div id="itemList"></div>
            </div>

            <div class="editor">

                <div class="panel">
                    <input id="item_name" placeholder="internal name">
                    <input id="item_display_name" placeholder="display name">

                    <select id="item_type">
                        <option>misc</option>
                        <option>weapon</option>
                        <option>armor</option>
                        <option>consumable</option>
                    </select>

                    <select id="item_rarity">
                        <option>common</option>
                        <option>rare</option>
                        <option>epic</option>
                    </select>

                    <input id="item_value" placeholder="value">
                    <input id="item_weight" placeholder="weight">

                    <input id="item_slot" placeholder="slot">
                    <input id="item_defense" placeholder="defense">
                    <input id="item_damage" placeholder="damage">

                    <label><input type="checkbox" id="item_stackable"> stackable</label>
                </div>

                <div class="panel">
                    <input id="item_short" placeholder="short desc">
<textarea id="item_desc" placeholder="long desc"></textarea>
                </div>

            </div>
        </div>

        <!-- MOBS -->
        <div id="mobs" class="page">
            <div class="sidebar">
                <h3>Mobs</h3>
                <button onclick="newMob()">+ New</button>
                <button onclick="saveMob()">💾 Save</button>
                <button onclick="deleteMob()">❌ Delete</button>
                <div id="mobList"></div>
            </div>

            <div class="editor">

                <div class="panel">
                    <input id="mob_name" placeholder="name">
                    <input id="mob_level" placeholder="level">
                    <input id="mob_hp" placeholder="hp">
                    <input id="mob_damage" placeholder="damage">
                    <input id="mob_gold" placeholder="gold">
                </div>

                <div class="panel">
                    <input id="mob_short" placeholder="short desc">
<textarea id="mob_long" placeholder="long desc"></textarea>
                    <input id="mob_look" placeholder="look desc">
                </div>

            </div>
        </div>

    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll(".page").forEach(p => p.style.display = "none");
            document.getElementById(id).style.display = "flex";

            if (id === "rooms") loadRooms();
            if (id === "items") loadItems();
            if (id === "mobs") loadMobs();
        }
    </script>

    <script src="js/rooms.js"></script>
    <script src="js/items.js"></script>
    <script src="js/mobs.js"></script>

</body>
</html>
