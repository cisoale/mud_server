<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="app">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <h2>Mobs</h2>
            <button class="add" onclick="newMob()">+ Nuovo</button>
            <div id="list"></div>
        </div>

        <!-- EDITOR -->
        <div class="editor">

            <h2 id="title">Mob Editor</h2>

            <input id="name" placeholder="Nome">

            <h3>Stats</h3>
            <input id="hp" type="number" placeholder="HP">
            <input id="damage" type="number" placeholder="Damage">
            <input id="xp" type="number" placeholder="XP">

            <h3>Loot</h3>
            <div id="loot"></div>
            <button class="add" onclick="addLoot()">+ Aggiungi Loot</button>

            <br><br>

            <button class="save" onclick="save()">💾 Salva</button>
            <button class="delete" onclick="del()">🗑 Elimina</button>

        </div>

    </div>

    <script src="js/mobs.js"></script>
</body>
</html>
