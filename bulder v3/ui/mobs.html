<div class="editor">

    <div class="panel">
        <h3>Base</h3>
        <div class="grid">
            <input id="mob_name" placeholder="Name">
            <input id="mob_level" placeholder="Level">
        </div>

        <div class="grid">
            <input id="mob_hp" placeholder="HP">
            <input id="mob_damage" placeholder="Damage">
        </div>

        <div class="grid">
            <input id="mob_defense" placeholder="Defense">
            <input id="mob_xp" placeholder="XP">
        </div>
    </div>

    <div class="panel">
        <h3>Economy</h3>
        <div class="grid">
            <input id="mob_gold_min" placeholder="Gold Min">
            <input id="mob_gold_max" placeholder="Gold Max">
        </div>
    </div>

    <div class="panel">
        <h3>Behavior</h3>
<textarea id="mob_ai" placeholder="AI JSON"></textarea>
<textarea id="mob_spawn" placeholder="Spawn JSON"></textarea>
<textarea id="mob_flags" placeholder="Flags JSON"></textarea>
    </div>

    <div class="panel">
        <h3>Loot</h3>
<textarea id="mob_loot" placeholder="Loot JSON"></textarea>
    </div>

    <button class="save" onclick="saveMob()">💾 Save</button>
    <button class="delete" onclick="deleteMob()">🗑 Delete</button>

</div>
