<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MUD Builder</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #1e1e1e;
            color: white;
        }

        #container {
            display: flex;
            height: 100vh;
        }

        #map {
            flex: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #2b2b2b;
        }

        canvas {
            border: 1px solid #555;
        }

        #editor {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #111;
        }

        .section {
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #333;
            background: #181818;
        }

            .section h3 {
                margin: 0 0 10px 0;
                border-bottom: 1px solid #333;
            }

        input, textarea, select {
            width: 100%;
            margin-bottom: 5px;
            padding: 5px;
            background: #222;
            color: white;
            border: 1px solid #555;
        }

        button {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            background: #444;
            color: white;
            border: none;
        }

        .exit-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .exit-block {
            background: #202020;
            padding: 5px;
            border: 1px solid #333;
        }
    </style>
</head>

<body>

    <div id="container">

        <!-- MAPPA -->
        <div id="map">
            <canvas id="mapCanvas" width="900" height="600"></canvas>
        </div>

        <!-- EDITOR -->
        <div id="editor">

            <!-- ROOM -->
            <div class="section">
                <h3>Room</h3>
                <input id="vnum" placeholder="VNUM">
                <input id="name" placeholder="Nome">
                <textarea id="desc" placeholder="Descrizione"></textarea>
                <button onclick="saveRoom()">💾 Salva Room</button>
            </div>

            <!-- USCITE -->
            <div class="section">
                <h3>Uscite</h3>
                <div class="exit-grid">
                    <script>
                        const dirs = ["north", "south", "east", "west", "up", "down"];
                        document.write(dirs.map(d => `
                                <div class="exit-block">
                                    <strong>${d.toUpperCase()}</strong>
                                    <input id="exit_${d}" placeholder="Destinazione">
                                    <label><input type="checkbox" id="${d}_door"> Porta</label><br>
                                    <label><input type="checkbox" id="${d}_closed"> Chiusa</label><br>
                                    <label><input type="checkbox" id="${d}_locked"> Locked</label><br>
                                    <input id="${d}_key" placeholder="Chiave">
                                    <label><input type="checkbox" id="${d}_secret"> Segreta</label>
                                </div>
                            `).join(""));
                    </script>
                </div>
            </div>

            <!-- ROOM MOBS -->
            <div class="section">
                <h3>Mob nella Room</h3>
                <select id="mob_select"></select>
                <button onclick="addMobToRoom()">➕ Aggiungi Mob</button>
                <ul id="mob_list"></ul>
            </div>

            <!-- ROOM ITEMS -->
            <div class="section">
                <h3>Item nella Room</h3>
                <select id="item_select"></select>
                <button onclick="addItemToRoom()">➕ Aggiungi Item</button>
                <ul id="item_list"></ul>
            </div>

            <!-- MOB EDITOR -->
            <div class="section">
                <h3>Mob Editor</h3>

                <input id="mob_name" placeholder="Nome mob">
                <input id="mob_hp" placeholder="HP">
                <input id="mob_damage" placeholder="Damage">
                <input id="mob_xp" placeholder="XP">
                <input id="mob_loot" placeholder="Loot (es: spada,oro)">

                <button onclick="saveMob()">💾 Salva Mob</button>

                <h4>Lista Mob</h4>
                <ul id="mob_db_list"></ul>
            </div>

            <!-- ITEM EDITOR -->
            <div class="section">
                <h3>Item Editor</h3>

                <input id="item_name" placeholder="Nome item">
                <input id="item_type" placeholder="Tipo (weapon, armor)">
                <input id="item_damage" placeholder="Damage">
                <input id="item_defense" placeholder="Defense">

                <button onclick="saveItem()">💾 Salva Item</button>

                <h4>Lista Item</h4>
                <ul id="item_db_list"></ul>
            </div>

        </div>
    </div>

    <script src="/static/app.js"></script>

</body>
</html>
