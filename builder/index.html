<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MUD Builder</title>

    <style>

        #navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #222;
            padding: 8px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

            #navbar button {
                padding: 6px 12px;
                background: #444;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
            }

                #navbar button:hover {
                    background: #00d4ff;
                    color: black;
                }

        /* spazio sotto navbar */
        body {
            margin-top: 50px;
        }

        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: Arial;
        }

        /* MAPPA */
        #map {
            flex: 2;
            position: relative;
            background: #111;
        }

        /* CANVAS LINEE */
        #lines {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        /* EDITOR */
        #editor {
            flex: 1;
            background: #1e1e1e;
            color: white;
            padding: 15px;
            overflow-y: auto;
        }

        /* ROOM */
        .room {
            position: absolute;
            width: 60px;
            height: 60px;
            background: #3498db;
            color: white;
            text-align: center;
            line-height: 60px;
            border-radius: 8px;
            cursor: pointer;
        }

            .room.selected {
                background: #e74c3c;
            }

        /* INPUT */
        input, textarea {
            width: 100%;
            margin-bottom: 10px;
            padding: 5px;
            border-radius: 4px;
            border: none;
        }

        /* BUTTON */
        button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            cursor: pointer;
        }

        /* EXITS */
        .exit-card {
            background: #2a2a2a;
            border: 1px solid #444;
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 6px;
        }

        .exit-header {
            font-weight: bold;
            margin-bottom: 5px;
            color: #00d4ff;
        }

        .exit-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            margin-bottom: 5px;
        }

        .exit-input {
            padding: 4px;
            border-radius: 4px;
            border: none;
        }

        .exit-flags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .flag {
            font-size: 12px;
            background: #111;
            padding: 3px 6px;
            border-radius: 4px;
            cursor: pointer;
        }

            .flag.active {
                background: #00d4ff;
                color: black;
            }
    </style>
</head>

<body>

    <<div id="navbar">

    <button onclick="goTo('/')">
        🗺️ Map
    </button>

    <button onclick="goTo('/editor')">
        ⚙️ Editor (Mob + Items)
    </button>

</div>

    <div id="map">
        <canvas id="lines"></canvas>
    </div>

    <div id="editor">

        <h2>Room Editor</h2>

        <label>VNUM</label>
        <input id="roomVnum" disabled>

        <label>Nome</label>
        <input id="roomName">

        <label>Descrizione</label>
        <textarea id="roomDesc"></textarea>

        <h3>Uscite</h3>
        <div id="exits"></div>

        <button onclick="saveRooms()">💾 Salva</button>

    </div>

    <script src="app.js"></script>

</body>
</html>
