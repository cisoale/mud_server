<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Visual Mob Builder</title>

    <style>
        body {
            font-family: Arial;
            background: #111;
            color: #eee;
            display: flex;
            margin: 0;
        }

        #left {
            width: 25%;
            background: #1b1b1b;
            padding: 10px;
            overflow-y: auto;
            border-right: 1px solid #333;
        }

        #right {
            width: 75%;
            padding: 15px;
            overflow-y: auto;
        }

        h2, h3 {
            margin-top: 0;
        }

        input, textarea, select {
            width: 100%;
            padding: 6px;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            margin-bottom: 8px;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 8px;
            background: #444;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 5px;
        }

            button:hover {
                background: #00d4ff;
                color: black;
            }

        .field {
            margin-bottom: 12px;
        }

            .field label {
                font-size: 12px;
                color: #aaa;
            }

        .section {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }

        .card {
            background: #222;
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 6px;
        }

        .hint {
            font-size: 11px;
            color: #888;
            margin-bottom: 5px;
        }

        #mobList div {
            padding: 6px;
            cursor: pointer;
            border-bottom: 1px solid #333;
        }

            #mobList div:hover {
                background: #333;
            }
    </style>
</head>

<body>

    <!-- =========================
         SIDEBAR
    ========================== -->
    <div id="left">
        <h3>Mob</h3>
        <div id="mobList"></div>
        <button id="newMobBtn">+ Nuovo Mob</button>
    </div>

    <!-- =========================
         EDITOR
    ========================== -->
    <div id="right">

        <h2>Editor Mob</h2>

        <!-- BASE -->
        <div class="section">
            <h3>Base</h3>

            <div class="field">
                <label>Nome (snake_case)</label>
                <input id="name">
            </div>

            <div class="field">
                <label>Descrizione</label>
                <textarea id="description"></textarea>
            </div>

            <div class="field">
                <label>Tipo</label>
                <select id="type">
                    <option value="normal">Comune</option>
                    <option value="elite">Elite</option>
                    <option value="boss">Boss</option>
                </select>
            </div>
        </div>

        <!-- COMBAT -->
        <div class="section">
            <h3>Combattimento</h3>

            <div class="field">
                <label>Livello</label>
                <input id="level" type="number">
            </div>

            <div class="field">
                <label>HP</label>
                <input id="hp" type="number">
            </div>

            <div class="field">
                <label>Damage</label>
                <input id="damage" type="number">
            </div>

            <div class="field">
                <label>Defense</label>
                <input id="defense" type="number">
            </div>
        </div>

        <!-- PROGRESSION -->
        <div class="section">
            <h3>Progressione</h3>

            <div class="field">
                <label>XP</label>
                <input id="xp" type="number">
            </div>
        </div>

        <!-- ECONOMY -->
        <div class="section">
            <h3>Economia</h3>

            <div class="field">
                <label>Gold Min</label>
                <input id="gold_min" type="number">
            </div>

            <div class="field">
                <label>Gold Max</label>
                <input id="gold_max" type="number">
            </div>
        </div>

        <!-- LOOT -->
        <div class="section">
            <h3>Loot</h3>

            <div class="hint">
                Chance da 0 a 1 (0.5 = 50%)<br>
                Min/Max = quantità drop
            </div>

            <div id="lootContainer"></div>

            <button id="addLootBtn">+ Aggiungi Loot</button>
        </div>

        <!-- SAVE -->
        <button id="saveBtn">💾 Salva Mob</button>
        <button id="deleteBtn" style="background:#8b0000;">
            🗑 Elimina Mob
        </button>

    </div>

    <script src="editor_visual.js"></script>

</body>
</html>
